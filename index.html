<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TangentLab - 实验室官网</title>
    <style>
        /* 全局样式重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", Arial, sans-serif;
        }

        /* 页面主体样式 */
        body {
            background-color: #f5f5f5;
            color: #333;
            line-height: 1.6;
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
        }

        /* 头部样式 */
        header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #4a6fa5;
        }

        h1 {
            color: #2c3e50;
            margin-bottom: 10px;
        }

        .founder {
            font-size: 18px;
            color: #7f8c8d;
        }

        /* 实验室分类样式 */
        .lab-categories {
            margin: 30px 0;
            background-color: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .lab-categories h2 {
            color: #4a6fa5;
            margin-bottom: 15px;
            border-left: 4px solid #4a6fa5;
            padding-left: 10px;
        }

        .lab-item {
            margin: 10px 0;
            padding: 10px;
            background-color: #f8f9fa;
            border-radius: 4px;
        }

        .lab-item h3 {
            color: #2980b9;
            margin-bottom: 5px;
        }

        /* 联系方式样式 */
        .contact {
            background-color: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .contact h2 {
            color: #4a6fa5;
            margin-bottom: 15px;
            border-left: 4px solid #4a6fa5;
            padding-left: 10px;
        }

        .contact-links {
            list-style: none;
        }

        .contact-links li {
            margin: 8px 0;
            padding: 8px;
            background-color: #f8f9fa;
            border-radius: 4px;
        }

        .contact-links a {
            color: #2980b9;
            text-decoration: none;
            transition: color 0.3s;
        }

        .contact-links a:hover {
            color: #e74c3c;
            text-decoration: underline;
        }

        /* 页脚样式 */
        footer {
            text-align: center;
            margin-top: 30px;
            color: #7f8c8d;
            font-size: 14px;
        }
    </style>
</head>
